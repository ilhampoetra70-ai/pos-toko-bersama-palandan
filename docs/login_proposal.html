<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade / Rubber Hose Login Proposal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg-cream: hsl(43.8, 86.7%, 94.1%);
            --fg-teal: hsl(192.2, 80.8%, 14.3%);
            --primary-rose: hsl(330.96, 64.1%, 52%);
            --secondary-teal: hsl(175.46, 58.6%, 39.8%);
            --accent-orange: hsl(17.57, 80.4%, 44.1%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-cream);
            color: var(--fg-teal);
            overflow: hidden;
        }

        /* ── Dynamic Rubber Hose Background ── */
        .hose-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
            opacity: 0.15; /* subtle so it doesn't overpower the login */
            pointer-events: none;
        }

        .noodle {
            position: absolute;
            fill: none;
            stroke: var(--fg-teal);
            stroke-width: 15;
            stroke-linecap: round;
        }

        /* Animations for Background Elements */
        @keyframes floatSlow {
            0%   { transform: translateY(0px) rotate(0deg); }
            50%  { transform: translateY(-30px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes wiggleHose {
            0% { d: path("M-100,50 Q200,200 500,50 T1100,50"); }
            50% { d: path("M-100,100 Q200,0 500,100 T1100,100"); }
            100% { d: path("M-100,50 Q200,200 500,50 T1100,50"); }
        }

        @keyframes march {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        /* ── CRT Retro Arcade Overlay ── */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.05) 50%,
                rgba(0,0,0,0.05)
            );
            background-size: 100% 6px;
            z-index: 10;
            pointer-events: none;
        }

        .crt-flicker {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(192, 230, 230, 0.02);
            opacity: 0.5;
            z-index: 11;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.4; }
            50% { opacity: 0.6; }
            100% { opacity: 0.4; }
        }

        /* ── Login Container ── */
        .login-wrapper {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .login-card {
            background-color: var(--bg-cream);
            border: 6px solid var(--fg-teal);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 12px 12px 0px var(--fg-teal);
            position: relative;
            transform-style: preserve-3d;
            animation: cardEntrance 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes cardEntrance {
            from { transform: translateY(100px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Arcade Header */
        .arcade-title {
            font-size: 2.8rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-rose);
            text-shadow: 3px 3px 0px var(--fg-teal);
            margin-bottom: 30px;
            line-height: 1.1;
        }

        .arcade-subtitle {
            font-size: 1rem;
            text-align: center;
            font-weight: 700;
            margin-top: -20px;
            margin-bottom: 30px;
            color: var(--fg-teal);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-weight: 900;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 15px;
            width: 28px;
            height: 28px;
            stroke: var(--fg-teal);
            stroke-width: 8;
            fill: none;
        }

        .input-field {
            width: 100%;
            padding: 16px 16px 16px 55px;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--fg-teal);
            background-color: #fff;
            border: 4px solid var(--fg-teal);
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.05);
        }

        .input-field:focus {
            border-color: var(--primary-rose);
            box-shadow: 4px 4px 0px var(--fg-teal);
            transform: translate(-4px, -4px);
        }
        
        .input-field:focus + .input-icon {
            stroke: var(--primary-rose);
            animation: rubberHoseBounce 0.5s;
        }

        /* Button */
        .btn-arcade {
            width: 100%;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background-color: var(--primary-rose);
            border: 4px solid var(--fg-teal);
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--fg-teal);
            transition: all 0.1s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-arcade:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px var(--fg-teal);
        }

        .btn-arcade::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.4), rgba(255,255,255,0));
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* Character Deco */
        .deco-glove {
            position: absolute;
            top: -40px;
            right: -30px;
            width: 100px;
            height: 100px;
            animation: floatSlow 3s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes rubberHoseBounce {
            0% { transform: scaleY(1) scaleX(1); }
            25% { transform: scaleY(0.85) scaleX(1.15); }
            50% { transform: scaleY(1.1) scaleX(0.9); }
            75% { transform: scaleY(0.95) scaleX(1.05); }
            100% { transform: scaleY(1) scaleX(1); }
        }

        .insert-coin {
            text-align: center;
            margin-top: 25px;
            font-weight: 900;
            color: var(--secondary-teal);
            animation: blink 1s infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- CRT Overlay -->
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <!-- Dynamic Background -->
    <div class="hose-bg">
        <!-- Repeating squiggly noodle -->
        <svg width="100%" height="100%" preserveAspectRatio="none">
            <path class="noodle" id="wavy-bg-1" d="M-100,200 Q200,50 500,200 T1100,200 T1800,200" stroke-dasharray="40 20" style="animation: wiggleHose 4s infinite alternate ease-in-out, march 1s linear infinite;" />
            <path class="noodle" id="wavy-bg-2" d="M-100,600 Q200,750 500,600 T1100,600 T1800,600" stroke-width="25" stroke-dasharray="60 30" style="animation: wiggleHose 5s infinite alternate-reverse ease-in-out, march 2s linear infinite reverse;" />
            <path class="noodle" id="wavy-bg-3" d="M-100,900 Q200,750 500,900 T1100,900 T1800,900" stroke-dasharray="20 40" style="animation: wiggleHose 3s infinite alternate ease-in-out, march 1.5s linear infinite;" />
            
            <!-- Floating pie eyes background -->
            <g style="animation: floatSlow 4s infinite ease-in-out; transform-origin: center;">
                <ellipse cx="20%" cy="30%" rx="10" ry="25" fill="#193540"/>
                <path d="M 18% 25% L 22% 25% L 20% 30% Z" fill="#ebf0e6"/>
                <ellipse cx="25%" cy="30%" rx="10" ry="25" fill="#193540"/>
                <path d="M 23% 25% L 27% 25% L 25% 30% Z" fill="#ebf0e6"/>
            </g>

            <g style="animation: floatSlow 5s infinite ease-in-out reverse; transform-origin: center;">
                <ellipse cx="80%" cy="70%" rx="15" ry="35" fill="#193540"/>
                <path d="M 77% 63% L 83% 63% L 80% 70% Z" fill="#ebf0e6"/>
                <ellipse cx="88%" cy="70%" rx="15" ry="35" fill="#193540"/>
                <path d="M 85% 63% L 91% 63% L 88% 70% Z" fill="#ebf0e6"/>
            </g>
        </svg>
    </div>

    <!-- Login Centered -->
    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Glove decoration overlapping card -->
            <svg class="deco-glove" viewBox="0 0 100 100" style="fill:none; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; stroke:var(--fg-teal);">
                <path style="fill:#fff" d="M30 60 C20 60 15 50 15 40 C15 30 25 25 35 30 L40 33 C40 25 45 15 55 15 C65 15 70 25 70 35 L70 45 C75 40 85 40 90 48 C95 55 90 65 80 70 L40 85 C30 88 15 80 20 70 Z" />
                <path style="fill:#fff" d="M10 70 C0 75 10 90 20 85 L35 80 C40 78 35 65 25 68 Z" />
                <path style="fill:#fff" d="M22 83 C15 90 25 102 35 95 L48 88 C53 85 45 74 37 77 Z" />
                <path d="M45 50 C40 55 35 65 30 75" />
                <path d="M55 48 C52 55 50 65 48 75" />
            </svg>

            <div class="arcade-title">POS<br>TOKO</div>
            <div class="arcade-subtitle">Level 1: Kasir</div>

            <form>
                <div class="input-group">
                    <label>Player ID (Username)</label>
                    <div class="input-wrapper">
                        <!-- Retro Users Icon -->
                        <svg class="input-icon" viewBox="0 0 100 100">
                            <circle cx="50" cy="35" r="15"/>
                            <path d="M25 85 C25 65 40 55 50 55 C60 55 75 65 75 85"/>
                            <path d="M45 35 C42 35 40 30 46 30 C50 30 48 35 45 35 Z" fill="var(--fg-teal)"/>
                            <path d="M55 35 C52 35 50 30 56 30 C60 30 58 35 55 35 Z" fill="var(--fg-teal)"/>
                            <path d="M35 25 L65 25 L55 10 L45 10 Z" fill="var(--fg-teal)"/>
                        </svg>
                        <input type="text" class="input-field" placeholder="Masukkan ID..." value="admin" />
                    </div>
                </div>

                <div class="input-group">
                    <label>Secret Code (Password)</label>
                    <div class="input-wrapper">
                        <!-- Key / Token Lock Icon -->
                        <svg class="input-icon" viewBox="0 0 100 100">
                            <circle cx="35" cy="50" r="15"/>
                            <path d="M50 50 L85 50 L85 30 M70 50 L70 35"/>
                            <circle cx="35" cy="50" r="4" fill="var(--fg-teal)" />
                        </svg>
                        <input type="password" class="input-field" placeholder="••••••••" value="password" />
                    </div>
                </div>

                <button type="button" class="btn-arcade" onclick="bouncePlay()">Start Game</button>
            </form>

            <div class="insert-coin">Insert Coin To Play</div>
        </div>
    </div>

    <script>
        function bouncePlay() {
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            card.offsetHeight; /* trigger reflow */
            card.style.animation = 'rubberHoseBounce 0.4s ease-in-out';
        }

        // Dynamically adjust SVG path for wiggle to fill screen width
        function resizeSvg() {
            const w = window.innerWidth + 200;
            const bg1 = document.getElementById('wavy-bg-1');
            const bg2 = document.getElementById('wavy-bg-2');
            const bg3 = document.getElementById('wavy-bg-3');
            
            // Just updating the hardcoded path values to stretch further if needed
            // For proposal simplicity, the built-in viewbox handles most of it
        }
        window.addEventListener('resize', resizeSvg);
    </script>
</body>
</html>
