appId: com.pos.cashier
productName: POS Cashier
copyright: Copyright 2024

directories:
  output: dist
  buildResources: build

files:
  - electron/**/*
  - dist-renderer/**/*
  - package.json

extraMetadata:
  main: electron/main.js

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

portable:
  artifactName: "POS-Cashier-Portable-${version}.exe"

asar: true
