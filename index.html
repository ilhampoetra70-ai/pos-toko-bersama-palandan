<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>POS Cashier</title>
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/price-checker/icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' ws://localhost:* http://localhost:* ws:; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data: https://fonts.gstatic.com">
</head>

<body class="bg-gray-100">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Error handling untuk chunk loading failures
    window.addEventListener('vite:preloadError', (event) => {
      console.error('Vite preload error:', event);
      document.body.innerHTML = '<div style="padding:20px;text-align:center;"><h2>Terjadi Kesalahan Loading</h2><p>Silakan restart aplikasi atau hubungi support.</p><button onclick="location.reload()" style="padding:10px 20px;margin-top:10px;">Muat Ulang</button></div>';
    });
    window.addEventListener('error', (event) => {
      if (event.message && event.message.includes('dynamically imported module')) {
        console.error('Dynamic import error:', event);
        document.body.innerHTML = '<div style="padding:20px;text-align:center;"><h2>Terjadi Kesalahan Loading Modul</h2><p>Silakan restart aplikasi.</p><button onclick="location.reload()" style="padding:10px 20px;margin-top:10px;">Muat Ulang</button></div>';
      }
    });
  </script>
</body>

</html>
